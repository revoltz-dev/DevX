<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DevX – Gravador de Tela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #080808; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
    body {
      width: 100%;
      min-height: 100vh;
      font-family: "Anybody", sans-serif;
      background: #000;
      color: #fff;
      overflow-y: auto;
      padding: 24px 20px;
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header-title { font-size: 16px; font-weight: 700; letter-spacing: 1px; }
    .header-sub { font-size: 10px; color: #555; margin-top: 4px; text-transform: uppercase; letter-spacing: 2px; }
    .section { margin-bottom: 16px; }
    .section-label { font-size: 11px; color: #666; margin-bottom: 8px; font-weight: 600; }
    .source-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
    .source-tab {
      flex: 1; background: #080808; border: 1px solid #1a1a1a; color: #555;
      font-family: "Anybody", sans-serif; font-size: 10px; font-weight: 600;
      padding: 8px 0; border-radius: 6px; cursor: pointer; text-align: center;
      text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.15s;
    }
    .source-tab:hover { border-color: #333; color: #888; }
    .source-tab.active { border-color: #fff; color: #fff; background: #111; }
    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute; inset: 0; background: #151515;
      border-radius: 9px; cursor: pointer; transition: background 0.2s;
    }
    .toggle .slider::before {
      content: ""; position: absolute; width: 12px; height: 12px;
      left: 3px; top: 3px; background: #444; border-radius: 50%; transition: all 0.2s;
    }
    .toggle input:checked + .slider { background: #fff; }
    .toggle input:checked + .slider::before { background: #000; transform: translateX(16px); }
    .toggle-label { font-size: 10px; color: #555; }
    select {
      width: 100%; padding: 7px 10px; background: #080808; border: 1px solid #1a1a1a;
      border-radius: 6px; color: #555; font-family: "Anybody", sans-serif; font-size: 10px;
      margin-bottom: 14px; box-sizing: border-box; outline: none;
    }
    select:not(:disabled) { color: #ccc; }
    .btn {
      background: #080808; border: 1px solid #1a1a1a; color: #fff;
      font-family: "Anybody", sans-serif; font-size: 11px; font-weight: 600;
      padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
      width: 100%; text-align: center;
    }
    .btn:hover { background: #111; border-color: #333; }
    .btn-start { background: #1a1a1a; border-color: #333; font-size: 12px; }
    .btn-stop { border-color: #ff5f57; color: #ff5f57; }
    .timer {
      font-size: 38px; font-weight: 700; color: #fff; letter-spacing: 3px;
      margin-bottom: 14px; font-family: monospace; text-align: center;
    }
    .rec-status {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-bottom: 16px;
    }
    .rec-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #ff5f57;
      flex-shrink: 0; box-shadow: 0 0 4px #ff5f57;
    }
    .rec-label { font-size: 11px; color: #ff5f57; font-weight: 600; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row .btn { flex: 1; }
    .preview-wrap {
      margin-bottom: 10px; border-radius: 6px; overflow: hidden;
      border: 1px solid #1a1a1a;
    }
    .preview-wrap video { width: 100%; display: block; background: #000; }
    .file-info { font-size: 10px; color: #555; margin-bottom: 10px; text-align: center; }
    .mic-status { font-size: 9px; color: #444; margin-bottom: 8px; }
    .mic-status.ok { color: #5a5; }
    .mic-status.err { color: #f55; }
    .view { display: none; }
    .view.active { display: block; }
    @keyframes sr-blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    .blink { animation: sr-blink 1.2s ease-in-out infinite; }
    @keyframes sr-progress { 0%{transform:translateX(-100%)} 100%{transform:translateX(400%)} }
    .progress-wrap {
      width: 100%; height: 3px; background: #141414;
      border-radius: 3px; overflow: hidden;
    }
    .progress-bar {
      width: 25%; height: 100%; background: #ff5f57;
      border-radius: 3px; animation: sr-progress 1.5s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">DevX</div>
    <div class="header-sub">Gravador de Tela</div>
  </div>

  <div id="view-setup" class="view active">
    <div class="section">
      <div class="section-label">🖥️ Fonte de Captura</div>
      <div class="source-tabs">
        <button class="source-tab active" data-source="screen">Tela</button>
        <button class="source-tab" data-source="window">Janela</button>
        <button class="source-tab" data-source="tab">Aba</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">🔊 Áudio do Sistema</div>
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="system-audio" checked>
          <span class="slider"></span>
        </label>
        <span class="toggle-label">Capturar áudio da tela</span>
      </div>
    </div>

    <div class="section">
      <div class="section-label">🎤 Microfone</div>
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="mic-toggle">
          <span class="slider"></span>
        </label>
        <span class="toggle-label">Usar microfone</span>
      </div>
      <div id="mic-status" class="mic-status"></div>
      <select id="mic-select" disabled>
        <option value="">Selecione o microfone</option>
      </select>
    </div>

    <button class="btn btn-start" id="btn-start">🔴 Iniciar Gravação</button>
  </div>

  <div id="view-recording" class="view">
    <div class="timer" id="timer">00:00:00</div>
    <div class="rec-status">
      <div class="rec-dot blink" id="rec-dot"></div>
      <span class="rec-label" id="rec-label">GRAVANDO</span>
    </div>
    <div class="btn-row">
      <button class="btn" id="btn-pause">⏸️ Pausar</button>
      <button class="btn btn-stop" id="btn-stop">⏹️ Parar</button>
    </div>
  </div>

  <div id="view-processing" class="view">
    <div style="text-align:center;padding:30px 0;">
      <div style="font-size:11px;color:#555;margin-bottom:12px;">Processando vídeo…</div>
      <div class="progress-wrap">
        <div class="progress-bar"></div>
      </div>
    </div>
  </div>

  <div id="view-done" class="view">
    <div style="font-size:11px;color:#666;margin-bottom:10px;font-weight:600;text-align:center;">✅ Gravação finalizada</div>
    <div class="preview-wrap">
      <video id="preview" controls></video>
    </div>
    <div class="file-info" id="file-info"></div>
    <button class="btn" id="btn-download">💾 Baixar Vídeo</button>
    <button class="btn" id="btn-new" style="margin-top:6px;">🔄 Nova Gravação</button>
  </div>

  <script src="recorder.js"></script>
</body>
</html>
