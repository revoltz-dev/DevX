<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>DevX Interceptor</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:#080808; }
    ::-webkit-scrollbar-thumb { background:#222; border-radius:4px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background:#000; color:#e0e0e0; height:100vh; display:flex; flex-direction:column; overflow:hidden;
    }
    .header {
      padding:10px 16px; background:#080808; border-bottom:1px solid #141414;
      display:flex; align-items:center; gap:10px; flex-shrink:0;
    }
    .header h1 { font-size:14px; font-weight:700; white-space:nowrap; }
    .count {
      background:#e74c3c; color:#fff; border-radius:10px; padding:2px 8px;
      font-size:11px; font-weight:700; min-width:20px; text-align:center;
    }
    .status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .status-dot.active { background:#2ecc71; box-shadow:0 0 6px #2ecc71; animation:pulse 1.5s infinite; }
    .status-dot.inactive { background:#555; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .header-right { margin-left:auto; display:flex; gap:6px; flex-shrink:0; }
    .hbtn {
      background:#080808; border:1px solid #1a1a1a; color:#aaa;
      padding:5px 12px; border-radius:6px; cursor:pointer; font-size:11px;
      font-weight:600; transition:all .15s; white-space:nowrap;
    }
    .hbtn:hover { border-color:#333; color:#fff; }
    .hbtn.primary { border-color:#2ecc71; color:#2ecc71; }
    .hbtn.primary:hover { background:#2ecc71; color:#000; }
    .hbtn.danger { border-color:#e74c3c; color:#e74c3c; }
    .hbtn.danger:hover { background:#e74c3c; color:#fff; }
    .tab-info {
      padding:6px 16px; background:#050505; border-bottom:1px solid #141414;
      font-size:10px; color:#444; display:flex; align-items:center; gap:6px; flex-shrink:0;
      white-space:nowrap; overflow:hidden;
    }
    .tab-info img { width:12px; height:12px; border-radius:2px; flex-shrink:0; }
    .filters {
      padding:8px 16px; border-bottom:1px solid #141414; flex-shrink:0;
      display:flex; flex-direction:column; gap:6px;
    }
    .filter-search {
      width:100%; background:#080808; border:1px solid #1a1a1a; border-radius:6px;
      color:#ccc; font-size:11px; padding:6px 10px; outline:none;
    }
    .filter-search::placeholder { color:#333; }
    .filter-search:focus { border-color:#333; }
    .filter-types { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .filter-chk { display:flex; align-items:center; gap:3px; cursor:pointer; font-size:10px; color:#888; user-select:none; }
    .filter-chk input { accent-color:#2ecc71; cursor:pointer; width:12px; height:12px; }
    .filter-chk:hover { color:#ccc; }
    .list-wrap { flex:1; overflow-y:auto; }
    .req-item {
      display:flex; align-items:center; gap:8px; padding:5px 16px;
      border-bottom:1px solid #0a0a0a; cursor:pointer; font-size:11px; transition:background .1s;
    }
    .req-item:hover { background:#080808; }
    .req-item.selected { background:#0a0f0a; border-left:2px solid #2ecc71; padding-left:14px; }
    .req-item.has-error { opacity:0.6; }
    .req-item.req-latest { background:#0a0d0a; border-left:2px solid #2ecc71; padding-left:14px; }
    .method-badge {
      font-size:9px; font-weight:700; padding:2px 5px; border-radius:3px;
      min-width:36px; text-align:center; flex-shrink:0; text-transform:uppercase;
    }
    .method-GET    { background:#1a1a3a; color:#7aa3ff; }
    .method-POST   { background:#1a2a1a; color:#7aff7a; }
    .method-PUT    { background:#2a2a1a; color:#ffcc7a; }
    .method-DELETE { background:#2a1a1a; color:#ff7a7a; }
    .method-PATCH  { background:#2a1a2a; color:#cc7aff; }
    .method-HEAD   { background:#1a1a2a; color:#aaa; }
    .method-OPTIONS{ background:#1a1a2a; color:#888; }
    .method-WS     { background:#1a2a2a; color:#7affcc; }
    .method-SSE    { background:#2a1a2a; color:#ff7acc; }
    .method-BEACON { background:#1a1a2a; color:#7a7aff; }
    .transport-badge {
      font-size:8px; font-weight:700; padding:1px 4px; border-radius:2px;
      background:#111; color:#555; border:1px solid #1a1a1a; flex-shrink:0;
      text-transform:uppercase;
    }
    .req-url {
      flex:1; min-width:0; color:#bbb; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis; font-family:monospace; font-size:11px;
    }
    .req-status { font-size:10px; font-weight:700; flex-shrink:0; min-width:28px; text-align:center; }
    .s2 { color:#2ecc71; } .s3 { color:#f39c12; } .s4 { color:#e74c3c; } .s5 { color:#e74c3c; }
    .req-meta { font-size:9px; color:#444; flex-shrink:0; text-align:right; min-width:50px; }
    .iframe-badge { color:#f39c12; margin-left:2px; font-size:9px; }
    .detail-panel {
      border-top:1px solid #1a1a1a; background:#050505; flex-shrink:0;
      max-height:40vh; overflow-y:auto; display:none;
    }
    .detail-panel.open { display:block; }
    .detail-tabs { display:flex; gap:0; border-bottom:1px solid #141414; position:sticky; top:0; background:#050505; z-index:2; }
    .detail-tab {
      padding:7px 14px; font-size:10px; font-weight:600; color:#555;
      cursor:pointer; border-bottom:2px solid transparent; transition:all .15s;
    }
    .detail-tab:hover { color:#aaa; }
    .detail-tab.active { color:#fff; border-bottom-color:#2ecc71; }
    .detail-body { padding:10px 16px; }
    .detail-body pre {
      font-family:'Cascadia Code','Fira Code',monospace; font-size:11px;
      line-height:1.6; color:#aaa; white-space:pre-wrap; word-break:break-all;
    }
    .json-key { color:#7aa3ff; }
    .json-str { color:#98c379; }
    .json-num { color:#d19a66; }
    .json-bool { color:#c678dd; }
    .json-null { color:#555; }
    .empty-msg { text-align:center; padding:40px; color:#333; font-size:12px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="status-dot inactive" id="statusDot"></span>
    <h1>📡 DevX Interceptor</h1>
    <span class="count" id="count">0</span>
    <div class="header-right">
      <button class="hbtn primary" id="btnToggle">▶ Iniciar</button>
      <button class="hbtn" id="btnDownload">↓ JSON</button>
      <button class="hbtn danger" id="btnClear">✕ Limpar</button>
    </div>
  </div>
  <div class="tab-info" id="tabInfo">
    <span>Nenhuma aba selecionada</span>
  </div>
  <div class="filters">
    <input class="filter-search" id="filterSearch" placeholder="🔍 Filtrar por URL…" type="search">
    <div class="filter-types">
      <label class="filter-chk"><input type="checkbox" checked data-type="xhr"> XHR</label>
      <label class="filter-chk"><input type="checkbox" checked data-type="fetch"> Fetch</label>
      <label class="filter-chk"><input type="checkbox" checked data-type="websocket"> WebSocket</label>
      <label class="filter-chk"><input type="checkbox" checked data-type="sse"> SSE</label>
      <label class="filter-chk"><input type="checkbox" checked data-type="beacon"> Beacon</label>
      <span style="width:1px;height:14px;background:#1a1a1a;margin:0 4px;"></span>
      <label class="filter-chk"><input type="checkbox" checked id="filterIframes"> Iframes</label>
    </div>
  </div>
  <div class="list-wrap" id="listWrap">
    <div class="empty-msg" id="emptyMsg">Clique em "Iniciar" para capturar requisições</div>
  </div>
  <div class="detail-panel" id="detailPanel">
    <div class="detail-tabs" id="detailTabs"></div>
    <div class="detail-body" id="detailBody"></div>
  </div>
  <script src="interceptor.js"></script>
</body>
</html>
